<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IELTS Expression Trainer</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="home">
<header class="topbar">
  <a class="brand" href="index.html"><span class="brand-mark">IELTS</span><span><strong>Expression Trainer</strong><small>口语 · 写作 · 表达训练</small></span></a>
  <nav><a class="active" href="index.html">主页</a><a href="practice.html">练习</a><a href="knowledge.html">知识库</a></nav>
</header>
<main class="container">
  <section class="hero">
    <div>
      <p class="eyebrow">FUNCTION-FIRST PRACTICE</p>
      <h1>把英语表达练成可以直接调用的语块。</h1>
      <p class="lead">中文题干、短语拼接、主题迁移、自由输出。</p>
      <div class="actions"><a class="btn primary" href="practice.html">开始练习</a><a class="btn" href="knowledge.html">查看知识库</a></div>
    </div>
    <div class="panel hero-panel"><div id="stats" class="stats"></div><div class="progress-wrap"><div class="progress-line"><span>总完成度</span><strong id="overallProgressText">0%</strong></div><div class="progress-track"><i id="overallProgressBar"></i></div></div></div>
  </section>

  <section class="section">
    <div class="section-head"><div><p class="eyebrow">THEMES</p><h2>主题</h2></div><a class="text-link" href="practice.html">全部练习 →</a></div>
    <div id="themeCards" class="card-grid"></div>
  </section>

  <section class="section">
    <div class="section-head"><div><p class="eyebrow">FUNCTIONS</p><h2>表达类型</h2></div></div>
    <div id="functionCards" class="function-grid"></div>
  </section>

  <section class="section two-col">
    <div class="panel">
      <p class="eyebrow">PROGRESS</p><h2>本机记录</h2>
      <div class="actions compact"><button id="exportProgress" class="btn small">导出进度</button><button id="resetProgress" class="btn small danger">清空进度</button></div>
      <p class="muted small-text">记录保存在当前浏览器。</p>
    </div>
    <div class="panel">
      <p class="eyebrow">PROMPTS</p><h2>AI 提示词</h2>
      <div id="promptCards" class="prompt-list"></div>
    </div>
  </section>
</main>
<div id="toastRoot" class="toast-root"></div>
<script src="assets/js/fallback-data.js"></script>
<script src="assets/js/common.js"></script>
<script src="assets/js/home.js"></script>
</body>
</html>
