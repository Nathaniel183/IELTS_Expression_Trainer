<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>练习 | IELTS Expression Trainer</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="practice">
<header class="topbar">
  <a class="brand" href="index.html"><span class="brand-mark">IELTS</span><span><strong>Expression Trainer</strong><small>Practice</small></span></a>
  <nav><a href="index.html">主页</a><a class="active" href="practice.html">练习</a><a href="knowledge.html">知识库</a></nav>
</header>
<main class="container practice-layout">
  <aside class="panel controls">
    <div class="mobile-head"><h2>筛选</h2><button id="toggleList" class="icon-btn mobile-only">题目列表</button></div>
    <label>主题</label><select id="themeSelect"></select>
    <label>题型</label><select id="typeFilter"><option value="all">全部题型</option><option value="build">拼句题</option><option value="free">自由表达题</option></select>
    <label>表达类型</label><select id="functionFilter"></select>
    <label>模式</label><select id="modeFilter"><option value="all">口语与写作</option><option value="speaking">口语</option><option value="writing">写作</option><option value="both">通用</option></select>
    <label>顺序</label><div class="segmented"><button class="active" data-mode="order">顺序</button><button data-mode="random">随机</button><button data-mode="list">列表</button></div>
    <div class="progress-wrap"><div class="progress-line"><span>当前筛选</span><strong id="progressText">0/0</strong></div><div class="progress-track"><i id="progressBar"></i></div></div>
    <div class="button-row"><button id="prevBtn" class="btn small">上一题</button><button id="nextBtn" class="btn small primary">下一题</button></div>
    <button id="randomBtn" class="btn full">随机抽题</button>
  </aside>

  <section class="practice-workspace">
    <div id="questionListPanel" class="panel question-list-panel"><div class="list-title"><h2>题目</h2><span id="listCount" class="badge"></span></div><div id="questionList"></div></div>
    <article id="questionRoot" class="panel question-root"></article>
  </section>
</main>
<div id="toastRoot" class="toast-root"></div>
<script src="assets/js/fallback-data.js"></script>
<script src="assets/js/common.js"></script>
<script src="assets/js/practice.js"></script>
</body>
</html>
