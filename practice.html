<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>练习 | IELTS Expression Trainer</title><link rel="stylesheet" href="assets/css/style.css"/></head><body>
<header class="topbar"><a class="brand" href="index.html"><span class="logo">IELTS</span><span><b>Expression Trainer</b><small>Practice</small></span></a><nav><a href="index.html">主页</a><a class="active" href="practice.html">练习</a><a href="knowledge.html">知识库</a></nav></header>
